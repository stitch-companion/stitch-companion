<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>小蓝的陪伴空间</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;height:100%;font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif}
body{
  background:linear-gradient(180deg,#87CEEB 0%,#B8E6F0 30%,#E8F5E9 70%,#FFE4B5 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
/* 天空背景动画 */
.bg-sky{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.cloud-img{position:absolute;opacity:0.85;filter:blur(0.5px)}
.cloud1{top:8%;width:90px;animation:cf 30s linear infinite}
.cloud2{top:16%;width:65px;animation:cf 38s linear infinite;animation-delay:-14s}
@keyframes cf{0%{transform:translateX(-120px)}100%{transform:translateX(calc(100vw + 120px))}}
.sun-glow{position:absolute;top:5%;right:12%;width:70px;height:70px;background:radial-gradient(circle,#FFD93D 0%,#FFB347 60%,transparent 75%);border-radius:50%;animation:sp 4s ease-in-out infinite;box-shadow:0 0 60px #FFD93D,0 0 120px rgba(255,217,61,0.3)}
@keyframes sp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.9}}
.sea-layer{position:fixed;bottom:0;left:0;width:100%;height:38%;z-index:1;pointer-events:none}
.sea-color{position:absolute;bottom:0;width:100%;height:100%;background:linear-gradient(0deg,#00897B 0%,#26A69A 40%,#4ECDC4 100%);border-radius:60% 60% 0 0 / 12% 12% 0 0}
.wave-svg{position:absolute;top:-18px;left:0;width:200%;height:40px;animation:wm 8s linear infinite}
@keyframes wm{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* 主内容 */
.main-wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 20px}

/* 音频按钮 */
.audio-btn{position:fixed;top:calc(12px + env(safe-area-inset-top,0px));right:14px;z-index:200;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.92);border:none;font-size:20px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.audio-btn:active{transform:scale(0.9)}

/* 倒计时卡片 */
.card{background:rgba(255,255,255,0.93);backdrop-filter:blur(12px);border-radius:18px;padding:14px 24px;margin-bottom:14px;box-shadow:0 6px 20px rgba(0,0,0,0.08);text-align:center;width:100%;max-width:340px;animation:sd 0.6s ease-out}
@keyframes sd{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.card .label{font-size:13px;color:#636E72;margin-bottom:4px}
.card .days-row{display:flex;align-items:baseline;justify-content:center;gap:2px}
.card .days-num{font-size:32px;font-weight:800;color:#5B9BD5;cursor:pointer;padding:0 6px;border-bottom:2px dashed transparent;transition:border-color 0.2s}
.card .days-num:hover,.card .days-num:active{border-color:#6C5CE7}
.card .days-unit{font-size:16px;color:#2D3436;font-weight:500}
.card .edit-hint{font-size:11px;color:#bbb;margin-top:3px}
.card .quote{font-size:13px;color:#FF6B9D;margin-top:8px;font-weight:600;line-height:1.5;min-height:20px;transition:opacity 0.5s}

/* 3D画布 */
.stitch-canvas-wrap{position:relative;width:240px;height:280px;margin:4px 0;cursor:pointer;touch-action:none}
#stitchCanvas{width:100%;height:100%;display:block}
.canvas-hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.7);pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,0.3)}

/* 气泡 */
.bubble{position:absolute;top:-6px;left:50%;transform:translateX(-50%);background:#fff;padding:10px 16px;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.12);font-size:13px;color:#2D3436;max-width:240px;text-align:center;z-index:20;opacity:0;pointer-events:none;transition:opacity 0.3s;line-height:1.5;white-space:nowrap}
.bubble.show{opacity:1}
.bubble:after{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff}

/* 按钮组 */
.btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:340px;margin-top:12px}
.btn{background:rgba(255,255,255,0.93);border:none;border-radius:16px;padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(0,0,0,0.08);transition:transform 0.2s;min-height:82px;position:relative;overflow:hidden}
.btn:active{transform:scale(0.93)}
.btn .ic{font-size:24px}
.btn .lb{font-size:11px;color:#2D3436;font-weight:600}
.btn-chat{border-top:3px solid #6C5CE7}
.btn-breathe{border-top:3px solid #00B894}
.btn-mail{border-top:3px solid #FFB347}

/* 提示文字 */
.hint{font-size:11px;color:#888;text-align:center;margin-top:8px;line-height:1.5}

/* ========== 全屏界面通用 ========== */
.fs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;display:none;flex-direction:column}
.fs.active{display:flex}
.fs-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top,0px));background:rgba(255,255,255,0.96);box-shadow:0 2px 8px rgba(0,0,0,0.06);flex-shrink:0}
.fs-head h3{font-size:16px;color:#2D3436}
.fs-close{width:36px;height:36px;border:none;background:none;font-size:24px;color:#999;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.fs-close:active{background:rgba(0,0,0,0.06)}

/* 呼吸 */
.breath-bg{background:linear-gradient(180deg,#E8F5E9,#C8E6C9 50%,#A5D6A7 100%)}
.breath-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.breath-circle{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,#00B894,#00A085);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(0,184,148,0.35);transition:transform 4s ease-in-out}
.breath-circle.in{transform:scale(1.2)}
.breath-circle.out{transform:scale(1)}
.breath-circle .num{font-size:36px;font-weight:800;color:#fff}
.breath-circle .ph{font-size:15px;color:rgba(255,255,255,0.85)}
.breath-info{font-size:14px;color:#2D3436;text-align:center;line-height:1.7}
.breath-timer{font-size:13px;color:#888}
.breath-btn{background:#00B894;color:#fff;border:none;border-radius:24px;padding:13px 36px;font-size:14px;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(0,184,148,0.3);transition:transform 0.2s}
.breath-btn:active{transform:scale(0.95)}

/* 聊天 */
.chat-bg{background:linear-gradient(180deg,#F3E5F5,#E1BEE7 100%)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chat-msgs .msg{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;max-width:82%;word-break:break-word;animation:mf 0.25s ease-out}
@keyframes mf{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msgs .msg.st{background:#fff;color:#2D3436;align-self:flex-start;border-bottom-left-radius:4px}
.chat-msgs .msg.me{background:#6C5CE7;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-in{display:flex;gap:8px;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));background:rgba(255,255,255,0.96);flex-shrink:0}
.chat-in input{flex:1;border:2px solid #E0E0E0;border-radius:24px;padding:10px 16px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
.chat-in input:focus{border-color:#6C5CE7}
.chat-in .snd{width:42px;height:42px;border:none;background:#6C5CE7;color:#fff;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.2s}
.chat-in .snd:active{transform:scale(0.9)}
.chat-in .mic{width:42px;height:42px;border:none;background:#FF6B9D;color:#fff;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.chat-in .mic:active,.chat-in .mic.rec{background:#E74C3C;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}50%{box-shadow:0 0 0 10px rgba(231,76,60,0)}}
.typing{display:flex;gap:4px;padding:10px 14px;background:#fff;border-radius:16px;width:fit-content;align-self:flex-start}
.typing i{width:6px;height:6px;background:#6C5CE7;border-radius:50%;display:inline-block;animation:tb 1.2s infinite ease-in-out}
.typing i:nth-child(2){animation-delay:0.15s}
.typing i:nth-child(3){animation-delay:0.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* 信箱 */
.mail-bg{background:linear-gradient(180deg,#FFF8E1,#FFECB3 100%)}
.mail-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.mail-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,0.06)}
.mail-card .meta{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-bottom:8px}
.mail-card .body{font-size:14px;color:#2D3436;line-height:1.7;margin-bottom:10px}
.mail-card textarea{width:100%;border:2px solid #E0E0E0;border-radius:10px;padding:8px;font-size:13px;font-family:inherit;resize:none;outline:none;margin-bottom:6px;transition:border-color 0.2s}
.mail-card textarea:focus{border-color:#FFB347}
.mail-card .rbtn{background:#FFB347;color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:12px;font-family:inherit;cursor:pointer;transition:transform 0.2s}
.mail-card .rbtn:active{transform:scale(0.95)}
.write-btn{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom,0px));right:16px;z-index:310;width:52px;height:52px;border:none;background:#FFB347;color:#fff;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(255,179,71,0.4);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.write-btn:active{transform:scale(0.9)}

/* 写信弹窗 */
.writedraw{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:400;display:none;justify-content:center;align-items:center;padding:20px}
.writedraw.active{display:flex}
.writedraw .inner{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;position:relative;animation:su 0.35s ease-out}
@keyframes su{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.writedraw .inner h3{font-size:17px;color:#2D3436;margin-bottom:12px}
.writedraw .inner textarea{width:100%;border:2px solid #E0E0E0;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;min-height:120px;outline:none;line-height:1.7;transition:border-color 0.2s}
.writedraw .inner textarea:focus{border-color:#FFB347}
.writedraw .inner .send-btn{margin-top:10px;width:100%;background:linear-gradient(135deg,#FF6B9D,#FF8E9E);color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;cursor:pointer;transition:transform 0.2s}
.writedraw .inner .send-btn:active{transform:scale(0.97)}
.writedraw .x{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;background:none;font-size:22px;color:#aaa;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.writedraw .x:active{background:rgba(0,0,0,0.06)}

/* 秘密抽屉 */
.secretdraw{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);z-index:450;display:none;justify-content:center;align-items:center;padding:20px}
.secretdraw.active{display:flex}
.secretdraw .inner{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;position:relative;animation:su 0.35s ease-out;max-height:85vh;overflow-y:auto}
.secretdraw .inner h3{font-size:18px;color:#6C5CE7;margin-bottom:10px;text-align:center}
.secretdraw .hint{font-size:13px;color:#888;line-height:1.7;padding:12px;background:#F8F9FA;border-radius:10px;margin-bottom:14px}
.secretdraw .pw{width:100%;border:2px solid #E0E0E0;border-radius:12px;padding:12px;font-size:18px;text-align:center;letter-spacing:6px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color 0.2s}
.secretdraw .pw:focus{border-color:#FF6B9D}
.secretdraw .ub{width:100%;background:linear-gradient(135deg,#FF6B9D,#FF8E9E);color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;cursor:pointer;transition:transform 0.2s}
.secretdraw .ub:active{transform:scale(0.97)}
.secretdraw .x{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;background:none;font-size:22px;color:#aaa;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.secretdraw .secret-text{font-size:14px;color:#2D3436;line-height:1.8;padding:12px;background:#F8F9FA;border-radius:10px;white-space:pre-line}

/* 日期弹窗 */
.datepop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:420;display:none;justify-content:center;align-items:center}
.datepop.active{display:flex}
.datepop .inner{background:#fff;border-radius:18px;padding:22px;width:90%;max-width:320px;text-align:center}
.datepop .inner h4{font-size:16px;color:#2D3436;margin-bottom:10px}
.datepop .inner p{font-size:12px;color:#888;margin-bottom:12px}
.datepop .inner input{width:100%;border:2px solid #5B9BD5;border-radius:10px;padding:10px;font-size:15px;font-family:inherit;text-align:center;outline:none;margin-bottom:14px}
.datepop .inner button{background:#5B9BD5;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-family:inherit;cursor:pointer;margin:0 4px;transition:transform 0.2s}
.datepop .inner button:active{transform:scale(0.95)}
.datepop .inner button.cancel{background:#ccc}

/* Toast */
.toast{position:fixed;bottom:calc(120px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:11px 24px;border-radius:22px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:82%;text-align:center;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:380px){
  .stitch-canvas-wrap{width:200px;height:240px}
  .card .days-num{font-size:28px}
}
</style>
</head>
<body>

<!-- 天空背景 -->
<svg class="bg-sky" viewBox="0 0 400 300" preserveAspectRatio="none">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
<div class="bg-sky">
  <div class="sun-glow"></div>
  <div class="cloud-img cloud1">
    <svg viewBox="0 0 100 40" width="100" height="40"><ellipse cx="50" cy="28" rx="45" ry="12" fill="#fff"/><circle cx="32" cy="18" r="12" fill="#fff"/><circle cx="58" cy="16" r="10" fill="#fff"/></svg>
  </div>
  <div class="cloud-img cloud2">
    <svg viewBox="0 0 80 30" width="80" height="30"><ellipse cx="40" cy="22" rx="35" ry="9" fill="rgba(255,255,255,0.9)"/><circle cx="26" cy="14" r="9" fill="rgba(255,255,255,0.9)"/><circle cx="54" cy="13" r="7" fill="rgba(255,255,255,0.9)"/></svg>
  </div>
</div>
<!-- 海面 -->
<div class="sea-layer">
  <svg class="wave-svg" viewBox="0 0 1200 40" preserveAspectRatio="none"><path d="M0,20 C150,5 350,35 600,20 C850,5 1050,35 1200,20 L1200,40 L0,40Z" fill="rgba(255,255,255,0.35)"/></svg>
  <svg class="wave-svg" style="top:-12px;opacity:0.5;animation-delay:-4s" viewBox="0 0 1200 40" preserveAspectRatio="none"><path d="M0,20 C200,8 400,32 600,20 C800,8 1000,32 1200,20 L1200,40 L0,40Z" fill="rgba(255,255,255,0.25)"/></svg>
  <div class="sea-color"></div>
</div>

<!-- 音频按钮 -->
<button class="audio-btn" id="audioBtn" aria-label="音乐开关">🔇</button>

<!-- 主内容 -->
<div class="main-wrap" id="mainWrap">

  <!-- 倒计时 -->
  <div class="card">
    <div class="label">我已经陪你在沙特工作了</div>
    <div class="days-row">
      <span class="days-num" id="daysNum" onclick="openDatePop()">0</span>
      <span class="days-unit">天</span>
    </div>
    <div class="edit-hint" id="editHint">点击数字修改日期</div>
    <div class="quote" id="quoteText">今天你也很努力哦 💙</div>
  </div>

  <!-- 3D 史迪仔 -->
  <div class="stitch-canvas-wrap" id="canvasWrap">
    <canvas id="stitchCanvas" width="480" height="560"></canvas>
    <div class="bubble" id="bubble"></div>
    <div class="canvas-hint">触摸史迪仔互动 💙</div>
  </div>
  <div class="hint">长按爱心开锁 · 点击身体有惊喜</div>

  <!-- 按钮 -->
  <div class="btns">
    <button class="btn btn-chat" onclick="openChat()"><span class="ic">💬</span><span class="lb">聊天</span></button>
    <button class="btn btn-breathe" onclick="openBreath()"><span class="ic">🌬️</span><span class="lb">呼吸</span></button>
    <button class="btn btn-mail" onclick="openMail()"><span class="ic">💌</span><span class="lb">信箱</span></button>
  </div>
</div>

<!-- 呼吸界面 -->
<div class="fs breath-bg" id="breathUI">
  <div class="fs-head"><h3>🌬️ 呼吸放松</h3><button class="fs-close" onclick="closeBreath()">×</button></div>
  <div class="breath-body">
    <div class="breath-info" id="breathInfo">准备好了吗？跟着史迪仔一起呼吸 🌿</div>
    <div class="breath-circle" id="breathCircle">
      <span class="num" id="breathNum">0</span>
      <span class="ph" id="breathPhase">开始</span>
    </div>
    <div class="breath-timer" id="breathTimer"></div>
    <button class="breath-btn" id="breathBtn" onclick="startBreath()">开始呼吸</button>
  </div>
</div>

<!-- 聊天界面 -->
<div class="fs chat-bg" id="chatUI">
  <div class="fs-head"><h3>💬 和史迪仔聊天</h3><button class="fs-close" onclick="closeChat()">×</button></div>
  <div class="chat-msgs" id="chatMsgs">
    <div class="msg st">嘿！你来啦～有什么想跟我说的吗？😊</div>
  </div>
  <div class="chat-in">
    <input type="text" id="chatInput" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="mic" id="micBtn" onclick="toggleMic()">🎙️</button>
    <button class="snd" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- 信箱界面 -->
<div class="fs mail-bg" id="mailUI">
  <div class="fs-head"><h3>💌 匿名信箱</h3><button class="fs-close" onclick="closeMail()">×</button></div>
  <div class="mail-body" id="mailBody">
    <div style="text-align:center;padding:40px 20px;color:#aaa;font-size:13px;line-height:1.8">这里是你的树洞 📝<br>有什么心事都可以写下来</div>
  </div>
  <button class="write-btn" onclick="openWrite()">✏️</button>
</div>

<!-- 写信弹窗 -->
<div class="writedraw" id="writeDraw">
  <div class="inner">
    <button class="x" onclick="closeWrite()">×</button>
    <h3>✏️ 写一封信</h3>
    <textarea id="letterTxt" placeholder="写下你想说的话..." rows="5"></textarea>
    <button class="send-btn" onclick="sendLetter()">发送 💙</button>
  </div>
</div>

<!-- 秘密抽屉 -->
<div class="secretdraw" id="secretDraw">
  <div class="inner">
    <button class="x" onclick="closeSecret()">×</button>
    <div id="pwScreen">
      <h3>🔐 秘密抽屉</h3>
      <div class="hint">💡 想想你的破单日或者她的破单日有没有可能性呢？有不一样的惊喜哦~</div>
      <input class="pw" id="pwInput" type="password" placeholder="输入密码" maxlength="6" onkeydown="if(event.key==='Enter')unlock()">
      <button class="ub" onclick="unlock()">解锁</button>
    </div>
    <div id="secretBody" style="display:none"></div>
  </div>
</div>

let scene, camera, renderer, stitchGroup;

function initThree(){

function buildStitch(){

  // 身体（椭球）

  );
  body.position.y = -0.2;
  body.scale.set(1, 1.05, 0.9);
  stitchGroup.add(body);

  // 肚子（浅色椭圆）
  const belly = new THREE.Mesh(

    bellyMat
  );
  belly.position.set(0, 0.05, 0.55);
  belly.scale.set(0.85, 1, 0.6);
  stitchGroup.add(belly);

  // 头
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.85, 32, 32),
    blueMat
  );
  head.position.y = 1.05;
  head.scale.set(1.05, 1, 0.95);
  stitchGroup.add(head);

  // 耳朵（两个，带粉色内侧）
  [-1, 1].forEach(side => {
    const ear = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 16, 16),
      blueMat
    );
    ear.position.set(side * 0.7, 1.75, 0);
    ear.scale.set(0.7, 1.2, 0.6);
    stitchGroup.add(ear);
    // 耳内粉色
    const earIn = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 12, 12),
      earInMat
    );
    earIn.position.set(side * 0.72, 1.78, 0.08);
    earIn.scale.set(0.6, 0.8, 0.5);
    stitchGroup.add(earIn);
  });

  // 眼睛（白色底座 + 黑色瞳孔）
  [-0.28, 0.28].forEach(x => {
    const eyeW = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 16, 16),
      eyeWhiteMat
    );
    eyeW.position.set(x, 1.1, 0.72);

    const pupil = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 12, 12),
      pupilMat
    );
    pupil.position.set(x, 1.08, 0.82);
    pupil.userData = {baseX: x, baseZ: 0.82};
    pupil.name = 'pupil';
    stitchGroup.add(pupil);
    // 高光
    const highlight = new THREE.Mesh(
      new THREE.SphereGeometry(0.035, 8, 8),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );
    highlight.position.set(x + 0.03, 1.13, 0.89);
    stitchGroup.add(highlight);
  });

  // 鼻子
  const nose = new THREE.Mesh(
    new THREE.SphereGeometry(0.09, 12, 12),
    noseMat
  );
  nose.position.set(0, 0.95, 0.82);
  stitchGroup.add(nose);

  // 嘴巴（用环）
  const mouthGeo = new THREE.TorusGeometry(0.12, 0.025, 8, 16, Math.PI);
  const mouth = new THREE.Mesh(mouthGeo, noseMat);
  mouth.position.set(0, 0.82, 0.78);
  mouth.rotation.x = Math.PI;
  stitchGroup.add(mouth);

  // 左手
  const armL = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.15, 0.6, 8, 12),
    blueMat
  );
  armL.position.set(-1.0, -0.15, 0);
  armL.rotation.z = 0.4;

    blueMat
  );
  armR.position.set(1.0, -0.15, 0);
  armR.rotation.z = -0.4;
  stitchGroup.add(armR);

  // 脚
  [-0.3, 0.3].forEach(x => {

  stitchGroup.position.y = -0.3;
}

function animate(){
  requestAnimationFrame(animate);

  // 浮动
  const t = Date.now() * 0.001;
  stitchGroup.position.y = -0.3 + Math.sin(t * 1.2) * 0.12;
  stitchGroup.rotation.y = currentRotY + Math.sin(t * 0.8) * 0.06;

  // 鼠标跟踪
  targetRotY += (mouseX * 0.3 - targetRotY) * 0.05;
  currentRotY += (targetRotY - currentRotY) * 0.08;

  // 瞳孔跟踪鼠标
  const pupils = stitchGroup.children.filter(c => c.name === 'pupil');
  pupils.forEach(p => {
    const bx = p.userData.baseX;
    const bz = p.userData.baseZ;
    p.position.x = bx + mouseX * 0.04;
    p.position.y = 1.08 - mouseY * 0.03;
  });

  renderer.render(scene, camera);
}

function startWhiteNoise(){
  // 用 Web Audio 生成海浪白噪音（降级方案）
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const bufferSize = 2 * ac.sampleRate;
  const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){
    data[i] = (Math.random()*2-1) * 0.08;
  }
  const src = ac.createBufferSource();
  src.buffer = buffer;
  src.loop = true;
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  src.connect(filter);
  filter.connect(ac.destination);
  filter.gain = 0.3;
  src.start();
  window._noiseNode = src;
  window._noiseAC = ac;
}

function startBreath(){
  const circle = document.getElementById('breathCircle');
  const num = document.getElementById('breathNum');
  const phase = document.getElementById('breathPhase');
  const info = document.getElementById('breathInfo');
  const timer = document.getElementById('breathTimer');
  document.getElementById('breathBtn').style.display = 'none';
  info.innerHTML = '吸气 4秒 → 屏息 4秒 → 呼气 6秒<br><small>跟着节奏走 🌿</small>';
  let s = 0, cp = 'inhale', total = 0, dur = 300;
  breathInterval = setInterval(()=>{
    s++; total++;
    const rem = dur - total;
    timer.textContent = `剩余 ${Math.floor(rem/60)}分${rem%60}秒`;
    if(total >= dur){ clearInterval(breathInterval); finishBreath(); return; }
    num.textContent = total;
    if(cp==='inhale'){
      if(s<=4){ circle.className='breath-circle in'; phase.textContent='吸气'; }
      else if(s<=8){ phase.textContent='屏息'; circle.className='breath-circle'; }
      else { cp='exhale'; s=0; }
    } else {
      if(s<=6){ circle.className='breath-circle out'; phase.textContent='呼气'; }
      else { cp='inhale'; s=0; }
    }
  }, 1000);
}
function finishBreath(){
  closeBreath();
  document.getElementById('breathInfo').innerHTML = '🎉 太棒了！<br>你做得很认真！继续加油 💙';

function toggleMic(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    showToast('当前浏览器不支持语音输入 😢'); return;
  }
  if(!recog) recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recog.lang = 'zh-CN'; recog.continuous = false; recog.interimResults = false;
  recog.onresult = e => {
    document.getElementById('chatInput').value = e.results[0][0].transcript;
    stopMic(); sendMsg();
  };
  recog.onerror = ()=> stopMic();
  recog.onend = ()=> stopMic();
  if(!recing){ recing=true; document.getElementById('micBtn').classList.add('rec'); recog.start(); showToast('我在听... 🎙️', 2000); }
  else { stopMic(); }
}
function stopMic(){
  recing=false; document.getElementById('micBtn').classList.remove('rec');
  try{recog&&recog.stop();}catch(e){}
}

// ========== 信箱 ==========
function openMail(){ document.getElementById('mailUI').classList.add('active'); loadMail(); }
function closeMail(){ document.getElementById('mailUI').classList.remove('active'); }
function loadMail(){
  const c = document.getElementById('mailBody');
  if(!letters.length){
    c.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#aaa;font-size:13px;line-height:1.8">这里是你的树洞 📝<br>有什么心事都可以写下来</div>';
    return;
  }
  c.innerHTML = letters.map((l,i)=>`
    <div class="mail-card">
      <div class="meta"><span>💌 匿名信</span><span>${l.time}</span></div>
      <div class="body">${escHtml(l.content)}</div>
      ${l.reply?`<div style="background:#FFF3E0;padding:8px 10px;border-radius:8px;font-size:12px;margin-top:6px"><strong>回复：</strong>${escHtml(l.reply)}</div>`:
        `<textarea rows="2" placeholder="写下回复..." id="r${i}"></textarea><button class="rbtn" onclick="sendReply(${i})">回复</button>`}
    </div>`).join('');
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function openWrite(){ document.getElementById('writeDraw').classList.add('active'); }
function closeWrite(){ document.getElementById('writeDraw').classList.remove('active'); document.getElementById('letterTxt').value=''; }
function sendLetter(){
  const v = document.getElementById('letterTxt').value.trim();
  if(!v){ showToast('写点什么吧～'); return; }
  letters.push({content:v, time:new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'}), reply:null});
  localStorage.setItem('stitch_v2_letters', JSON.stringify(letters));
  closeWrite(); loadMail(); showToast('信已收到 💙');
}
function sendReply(i){
  const v = document.getElementById('r'+i).value.trim();
  if(!v){ showToast('写点什么～'); return; }
  letters[i].reply = v;
  localStorage.setItem('stitch_v2_letters', JSON.stringify(letters));
  loadMail(); showToast('回复已发送 💙');
}

// ========== 秘密抽屉 ==========
function unlock(){
  const pw = document.getElementById('pwInput').value;
  const body = document.getElementById('secretBody');
  if(pw==='0118'){
    document.getElementById('pwScreen').style.display='none';
    body.style.display='block';
    body.innerHTML = `<h3 style="color:#6C5CE7;margin-bottom:12px;text-align:center">💙 给你的暖心话</h3>
      <div class="secret-text">${pick([
        "亲爱的，我知道你最近很累。但请相信，一切都会好起来的。你比自己想象的更坚强 💙",
        "在沙特的每一天都是一种成长。你的坚持，终将照亮前路。我在这里，一直陪着你 🌟",
        "有时候，停下来喘口气不是放弃，而是为了走更远的路。你值得休息 💜",
        "谢谢你这么努力。你不需要成为任何人，做你自己就好。我爱这样的你 💗",
        "不管今天发生了什么，你都尽力了。这就够了。明天又是新的一天 ✨"
      ])}</div>`;
    showToast('解锁成功 💜');
  } else if(pw==='1124'){
    document.getElementById('pwScreen').style.display='none';
    body.style.display='block';
    body.innerHTML = `<h3 style="color:#FF6B9D;margin-bottom:12px;text-align:center">🎵 专属音频</h3>
      <p style="font-size:13px;color:#888;text-align:center;margin-bottom:12px">来自史迪仔的鼓励 👇</p>
      <audio controls style="width:100%;border-radius:10px"><source src="effort.mp3" type="audio/mpeg"></audio>
      <p style="font-size:11px;color:#bbb;margin-top:8px;text-align:center">（请将 effort.mp3 放在网站目录）</p>`;
    showToast('解锁成功 🎵');
  } else {
    showToast('密码不对哦，再想想~ 🤔');
    document.getElementById('pwInput').value='';
  }
}
function closeSecret(){
  document.getElementById('secretDraw').classList.remove('active');
  document.getElementById('pwInput').value='';
  document.getElementById('pwScreen').style.display='block';
  document.getElementById('secretBody').style.display='none';
}

// ========== 初始化 ==========
function init(){
  updateDays();
  document.getElementById('quoteText').textContent = getQuote();
  initThree();

  // 微信内禁止双指缩放
  document.addEventListener('touchmove', e=>{
    if(e.touches.length>1) e.preventDefault();
  }, {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());
}
document.addEventListener('DOMContentLoaded', init);
</script>
