<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>史迪仔24Ai</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(160deg,#E8F0FE 0%,#D4E4F7 20%,#E8D5F5 50%,#FDE8E8 80%,#FFF3E0 100%);display:flex;flex-direction:column;align-items:center;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);min-height:100dvh}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.main-wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:12px 14px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.card{background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-radius:16px;padding:14px 16px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.06);text-align:center}
.card-sm{padding:10px 14px}
.day-text{font-size:14px;color:#555;line-height:1.6;cursor:pointer}
.day-text span{color:#6C5CE7;font-weight:700}
.day-num{color:#5B9BD5;font-weight:800;font-size:22px}
.quote-line{font-size:12px;color:#FF6B9D;margin-top:4px;font-weight:500}
.model-wrap{width:200px;height:250px;position:relative;margin:4px auto}
#modelCanvas{width:100%;height:100%;display:block;cursor:pointer;touch-action:none}
.fallback-img{width:100%;height:100%;object-fit:contain;display:none;border-radius:50%;box-shadow:0 8px 25px rgba(0,0,0,.2)}
.loading-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.4);border-radius:16px;z-index:5}
.loading-overlay .emoji{font-size:36px}
.loading-overlay .bar{width:80%;max-width:160px;height:6px;background:#E0E0E0;border-radius:3px;overflow:hidden}
.loading-overlay .bar-inner{width:0%;height:100%;background:linear-gradient(90deg,#6C5CE7,#A29BFE);border-radius:3px;transition:width .3s}
.loading-overlay .txt{font-size:11px;color:#888;margin-top:6px}
.btn-row{display:flex;gap:8px;justify-content:center;width:100%;flex-wrap:wrap}
.btn-cap{min-width:56px;height:48px;border-radius:24px;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 16px;transition:transform .2s;box-shadow:0 3px 10px rgba(0,0,0,.1);flex:1;max-width:120px}
.btn-cap:active{transform:scale(.92)}
.btn-green{background:linear-gradient(135deg,#00B894,#00A085);color:#fff}
.btn-orange{background:linear-gradient(135deg,#FFB347,#FF9800);color:#fff}
.btn-purple{background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:#fff}
.btn-label{font-size:11px;font-weight:600}
.chat-fab{position:fixed;bottom:20px;right:16px;z-index:200;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 6px 20px rgba(108,92,231,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.chat-fab:active{transform:scale(.9)}
.chat-fab.hidden{display:none}
.chat-box{position:fixed;bottom:0;right:0;width:100%;max-width:380px;height:60dvh;max-height:500px;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:300;display:none;flex-direction:column;overflow:hidden}
.chat-box.active{display:flex}
.chat-hd{padding:12px 16px;background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:#fff;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.chat-hd span{font-size:15px;font-weight:600}
.chat-hd .x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.chat-msgs{flex:1;padding:12px;overflow-y:auto;background:#F8F9FA;display:flex;flex-direction:column;gap:8px}
.msg{padding:9px 13px;border-radius:14px;max-width:82%;font-size:13px;line-height:1.5;word-break:break-word}
.msg.st{background:#fff;color:#333;align-self:flex-start;border-bottom-left-radius:4px}
.msg.me{background:#6C5CE7;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-in{display:flex;padding:8px 10px;background:#fff;border-top:1px solid #EAEAEA;gap:6px;flex-shrink:0}
.chat-in input{flex:1;border:2px solid #EAEAEA;border-radius:20px;padding:9px 14px;font-size:14px;outline:none;min-height:44px}
.chat-in input:focus{border-color:#6C5CE7}
.chat-in .snd{width:44px;height:44px;border:none;border-radius:50%;background:#6C5CE7;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sound-btn{position:fixed;top:12px;right:12px;z-index:150;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:16px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center}
.fs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:250;display:none;flex-direction:column}
.fs.active{display:flex}
.fs-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;padding-top:calc(12px+env(safe-area-inset-top,0));background:rgba(255,255,255,.96);box-shadow:0 2px 8px rgba(0,0,0,.05);flex-shrink:0}
.fs-hd h3{font-size:16px;color:#333}
.fs-close{width:36px;height:36px;border:none;background:none;font-size:22px;color:#999;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.fs-bd{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center}
.breath-bg{background:linear-gradient(180deg,#E8F5E9,#C8E6C9 50%,#A5D6A7 100%)}
.ex-bg{background:linear-gradient(180deg,#FFF3E0,#FFE0B2 50%,#FFCC80 100%)}
.mail-bg{background:linear-gradient(180deg,#F3E5F5,#E1BEE7 100%)}
.bcircle{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#00B894,#00A085);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(0,184,148,.3);transition:transform 4s ease-in-out;margin:20px 0}
.bcircle.in{transform:scale(1.2)}.bcirle.out{transform:scale(1)}
.bcircle .num{font-size:34px;font-weight:800;color:#fff}
.bcircle .ph{font-size:14px;color:rgba(255,255,255,.85)}
.breath-tip{font-size:14px;color:#555;text-align:center;line-height:1.6}
.breath-timer{font-size:13px;color:#888;margin-top:8px}
.breath-btn-row{display:flex;gap:10px;margin-top:16px}
.breath-btn{background:#00B894;color:#fff;border:none;border-radius:24px;padding:12px 30px;font-size:14px;font-family:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(0,184,148,.3);transition:transform .2s;min-height:44px}
.breath-btn:active{transform:scale(.95)}.breath-btn.gray{background:#888;box-shadow:none}.breath-btn.purple{background:#6C5CE7}
.ex-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ex-img{width:70px;height:70px;border-radius:20px;object-fit:cover;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.ex-emoji{font-size:80px;animation:exM 1s ease-in-out infinite}
@keyframes exM{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px) rotate(-5deg)}}
.ex-title{font-size:18px;font-weight:700;color:#333}
.ex-desc{font-size:13px;color:#888;text-align:center;line-height:1.6;margin:10px 0}
.ex-switch-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.ex-switch{padding:8px 16px;border-radius:16px;border:none;background:rgba(255,179,71,.3);color:#E65100;font-size:12px;font-family:inherit;cursor:pointer;min-height:36px}
.ex-switch.active{background:#FFB347;color:#fff}
.mail-write{width:100%;margin-bottom:14px}
.mail-write textarea{width:100%;border:2px solid #E0E0E0;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:80px;line-height:1.6}
.mail-write textarea:focus{border-color:#6C5CE7}
.mail-list{width:100%}
.mail-item{background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.mail-item .mt{font-size:11px;color:#999;display:flex;justify-content:space-between;margin-bottom:4px}
.mail-item .mc{font-size:13px;color:#333;line-height:1.6}
.mail-item .mr{font-size:12px;color:#6C5CE7;padding:6px 8px;background:#F3E5F5;border-radius:6px;margin-top:6px}
.draw{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:400;display:none;justify-content:center;align-items:center;padding:20px}
.draw.active{display:flex}
.draw .inner{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;position:relative;max-height:85vh;overflow-y:auto}
.draw h3{font-size:17px;color:#6C5CE7;margin-bottom:10px;text-align:center}
.draw .pw{width:100%;border:2px solid #E0E0E0;border-radius:12px;padding:11px;font-size:16px;text-align:center;letter-spacing:4px;font-family:inherit;outline:none;margin-bottom:10px;min-height:44px}
.draw .pw:focus{border-color:#FF6B9D}
.draw .ub{width:100%;background:linear-gradient(135deg,#FF6B9D,#FF8E9E);color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;cursor:pointer;min-height:44px}
.draw .x{position:absolute;top:10px;right:10px;width:30px;height:30px;border:none;background:none;font-size:20px;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%}
.setting-draw{z-index:500}
.toast{position:fixed;bottom:calc(100px+env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;max-width:80%}
.toast.show{opacity:1}
.long-banner{position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;padding:30px}
.long-banner.active{display:flex}
.long-content{background:#fff;border-radius:20px;padding:28px;text-align:center;max-width:320px}
.long-content h2{font-size:22px;color:#6C5CE7;margin-bottom:8px}
.long-content p{font-size:14px;color:#333;line-height:1.7}
/* 图片放大浮层 */
.img-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(0,0,0,.8);display:flex;justify-content:center;align-items:center;opacity:0;transition:opacity .3s}
.img-modal img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.img-modal .close-btn{position:absolute;top:20px;right:20px;width:44px;height:44px;background:rgba(255,255,255,.9);border-radius:50%;border:none;font-size:28px;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
@media(max-width:380px){.model-wrap{width:170px;height:220px}.btn-cap{min-width:48px;height:42px;font-size:16px;padding:0 12px}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="main-wrap">
  <div class="card card-sm" onclick="openSettings()">
    <div class="day-text">陪你在 <span id="locText">沙特</span> 的第 <span class="day-num" id="dayNum">0</span> 天</div>
    <div class="quote-line" id="quoteLine">今天的你也很努力，💙</div>
  </div>
  <div class="model-wrap" id="modelWrap">
    <canvas id="modelCanvas" width="400" height="500"></canvas>
    <img class="fallback-img" id="fallbackImg" src="stitch.png" style="display:none">
  </div>
  <div class="btn-row">
    <button class="btn-cap btn-green" onclick="openBreath()">🌬️ <span class="btn-label">呼吸</span></button>
    <button class="btn-cap btn-orange" onclick="openEx()">🏃 <span class="btn-label">运动</span></button>
    <button class="btn-cap btn-purple" onclick="openMail()">📪 <span class="btn-label">信箱</span></button>
  </div>
  <div style="text-align:center;font-size:11px;color:#aaa;margin-top:4px">💜 长按史迪仔心脏解锁秘密</div>
</div>
<button class="sound-btn" id="soundBtn">🔇</button>
<button class="chat-fab" id="chatFab" onclick="toggleChat()">💬</button>
<div class="chat-box" id="chatBox">
  <div class="chat-hd"><span>💬 史迪仔24Ai</span><button class="x" onclick="toggleChat()">×</button></div>
  <div class="chat-msgs" id="chatMsgs"><div class="msg st">嗷呜～你来啦！😎</div></div>
  <div class="chat-in"><input id="chatInput" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="snd" onclick="sendMsg()">➤</button></div>
</div>
<div class="toast" id="toast"></div>

<!-- 呼吸 -->
<div class="fs breath-bg" id="breathFS">
  <div class="fs-hd"><h3>🌬️ 深呼吸</h3><button class="fs-close" onclick="closeBreath()">×</button></div>
  <div class="fs-bd">
    <div class="breath-tip" id="breathTip">准备好了吗？🌿</div>
    <div class="bcircle" id="bcircle"><span class="num" id="bnum">0</span><span class="ph" id="bph">开始</span></div>
    <div class="breath-timer" id="breathTimer"></div>
    <div class="breath-btn-row"><button class="breath-btn" id="breathStart" onclick="startBreath()">开始</button><button class="breath-btn gray" id="breathPause" onclick="pauseBreath()" style="display:none">⏸ 暂停</button></div>
  </div>
</div>
<!-- 运动 -->
<div class="fs ex-bg" id="exFS">
  <div class="fs-hd"><h3>🏃 运动陪伴</h3><button class="fs-close" onclick="closeEx()">×</button></div>
  <div class="fs-bd">
    <div class="ex-top"><img src="stitch.png" class="ex-img"><div><div class="ex-title" id="exTitle">仰卧起坐</div></div></div>
    <div class="ex-emoji" id="exEmoji">🤸</div>
    <div class="ex-desc" id="exDesc">跟着史迪仔一起运动！💪</div>
    <div class="ex-switch-row"><button class="ex-switch active" onclick="switchEx(0)">🤸 仰卧起坐</button><button class="ex-switch" onclick="switchEx(1)">🏓 乒乓球</button><button class="ex-switch" onclick="switchEx(2)">🧘 消气操</button></div>
    <div class="breath-btn-row"><button class="breath-btn" style="background:#FFB347;box-shadow:0 4px 12px rgba(255,179,71,.3)" onclick="startExercise()">⏱ 开始3分钟</button><button class="breath-btn purple" onclick="closeEx()">完成 ✔</button></div>
    <div class="breath-timer" id="exTimer" style="margin-top:10px"></div>
  </div>
</div>
<!-- 信箱 -->
<div class="fs mail-bg" id="mailFS">
  <div class="fs-hd"><h3>📪 匿名信箱</h3><button class="fs-close" onclick="closeMail()">×</button></div>
  <div class="fs-bd" style="padding:16px">
    <div class="mail-write"><textarea id="mailInput" rows="3" placeholder="写下你想说的话..."></textarea><button class="breath-btn purple" style="width:100%;margin-top:6px;box-shadow:none" onclick="sendMail()">发送 💌</button></div>
    <div class="mail-list" id="mailList"><div style="text-align:center;padding:20px;color:#888;font-size:13px">还没有留言 📝</div></div>
  </div>
</div>
<!-- 秘密抽屉 -->
<div class="draw" id="draw">
  <div class="inner"><button class="x" onclick="closeDraw()">×</button>
    <div id="pwScreen"><h3>🔐 秘密抽屉</h3>
      <div style="font-size:13px;color:#888;padding:10px;background:#F8F9FA;border-radius:10px;margin-bottom:12px">💡 想想你和他的破蛋日哦～</div>
      <div id="lockMsg" style="font-size:12px;color:#E74C3C;text-align:center;margin-bottom:6px;display:none"></div>
      <input class="pw" id="pwInput" type="password" placeholder="输入6位密码" maxlength="6" onkeydown="if(event.key==='Enter')unlockDraw()">
      <button class="ub" onclick="unlockDraw()">解锁</button>
    </div>
    <div id="secretBody" style="display:none"></div>
  </div>
</div>
<!-- 设置 -->
<div class="draw setting-draw" id="settingsDraw">
  <div class="inner"><button class="x" onclick="closeSettings()">×</button>
    <h3>⚙️ 设置</h3>
    <div style="font-size:13px;color:#888;line-height:1.7">
      <div style="margin-bottom:12px"><label>📍 所在地</label><input id="locInput" class="pw" style="text-align:left;letter-spacing:0;font-size:14px;margin-top:4px" placeholder="沙特"></div>
      <div><label>📅 起始日期</label><input type="date" id="dateInput2" class="pw" style="text-align:left;letter-spacing:0;font-size:14px;margin-top:4px"></div><div style="margin-top:12px;font-size:12px;color:#aaa;text-align:center">点击顶部天数卡片可修改</div>
    </div>
    <button class="ub" onclick="saveSettings()">保存</button>
  </div>
</div>
<!-- 打卡横幅 -->
<div class="long-banner" id="longBanner">
  <div class="long-content"><h2 id="longTitle">🎉</h2><p id="longMsg"></p>
    <button class="breath-btn purple" style="margin-top:12px" onclick="document.getElementById('longBanner').classList.remove('active')">好的！</button>
  </div>
</div>

<script src="./three.min.js"></script>
<script src="./GLTFLoader.js"></script>
<script>
// ====== 工具 ======
var ST=function(m,d){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},d||2500)};
var PK=function(a){return a[Math.floor(Math.random()*a.length)]};
var escH=function(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')};

// ====== 海浪白噪音 ======
var noiseOn=false,noiseCtx=null,noiseSrc=null;
function toggleNoise(){
  if(!noiseCtx){noiseCtx=new(window.AudioContext||window.webkitAudioContext)();noiseCtx.resume()}
  if(!noiseOn){
    var bs=2*noiseCtx.sampleRate,buf=noiseCtx.createBuffer(1,bs,noiseCtx.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1)*.05;
    var s=noiseCtx.createBufferSource();s.buffer=buf;s.loop=true;
    var f=noiseCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=400;
    var g=noiseCtx.createGain();g.gain.value=.3;
    s.connect(f);f.connect(g);g.connect(noiseCtx.destination);s.start();
    noiseSrc=s;noiseOn=true;
    document.getElementById('soundBtn').textContent='🔊';ST('🌊 海浪声');
  }else{try{noiseSrc.stop()}catch(e){}noiseOn=false;document.getElementById('soundBtn').textContent='🔇';ST('已关闭')}
}
document.getElementById('soundBtn').onclick=toggleNoise;

// ====== 音频系统（用户手势内创建）=======
// 音量常量：呼吸音80%，BGM 30%
var VOL_BREATH=0.8,VOL_BGM=0.3;var BGM_POOL=[];function initBGMPool(){var files=["bgm1.mp3","bgm2.mp3","托口秀1.mp3","托口秀2.mp3"];BGM_POOL=files}initBGMPool();
// 脱口秀音频池
var BGM_POOL=['bgm1.mp3','bgm2.mp3'];
var usedBgm=[];

function pickBGM(){if(usedBgm.length>=BGM_POOL.length)usedBgm=[];var pool=BGM_POOL.filter(function(x){return usedBgm.indexOf(x)<0});if(pool.length===0){usedBgm=[];pool=BGM_POOL}var pick=PK(pool);usedBgm.push(pick);return pick}

// 当前播放的音频实例
var curBgm=null,bgmPlaying=false;
var breathAudio=null,effortAudio=null,secretAudio=null;

function stopBGM(){if(curBgm){try{curBgm.pause()}catch(e){}curBgm.currentTime=0;curBgm=null}bgmPlaying=false}
function pauseBGM(){if(curBgm)try{curBgm.pause()}catch(e){}}
function resumeBGM(){if(curBgm&&bgmPlaying)try{curBgm.play()}catch(e){}}
function setBGMVol(v){if(curBgm)curBgm.volume=v}

// ====== 动态波浪背景 ======
(function(){
  var c=document.getElementById('bgCanvas'),ctx=c.getContext('2d');
  function r(){c.width=c.offsetWidth*window.devicePixelRatio;c.height=c.offsetHeight*window.devicePixelRatio;ctx.scale(window.devicePixelRatio,window.devicePixelRatio)}
  r();window.addEventListener('resize',r);
  var t=0;
  function d(){requestAnimationFrame(d);t+=.008;var w=c.offsetWidth,h=c.offsetHeight;ctx.clearRect(0,0,w,h);
    for(var i=0;i<3;i++){ctx.beginPath();ctx.moveTo(0,h);for(var x=0;x<=w;x+=4){var y=h-70+Math.sin(x*.008+t+i*1.2)*15+Math.sin(x*.015+t*.9+i*1.8)*8+Math.sin(x*.002+t*.5)*4;ctx.lineTo(x,y)}ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle='rgba(200,180,255,'+(.04+i*.015)+')';ctx.fill()}
  }d();
})();

var scene,camera,renderer,model,modelLoadTimer=null;
function init3D(){
  var cn=document.getElementById('modelCanvas'),fi=document.getElementById('fallbackImg');
  scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(30,cn.width/cn.height,.1,100);camera.position.set(0,1,6);
  renderer=new THREE.WebGLRenderer({canvas:cn,alpha:true,antialias:true});
  renderer.setSize(cn.width,cn.height);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  scene.add(new THREE.AmbientLight(0xffffff,.6));
  var dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(3,6,4);scene.add(dl);
  scene.add(new THREE.DirectionalLight(0x88ccff,.3).position.set(-3,2,-2));

  var ld=document.createElement('div');ld.className='loading-overlay';ld.id='modelLoad';
  ld.innerHTML='<div class="emoji">🐾</div><div class="bar"><div class="bar-inner" id="progBar"></div></div><div class="txt" id="progTxt">加载3D史迪仔...</div>';
  document.getElementById('modelWrap').appendChild(ld);

  // 3秒超时降级
  modelLoadTimer=setTimeout(function(){
    var ml=document.getElementById('modelLoad');if(ml)ml.remove();
    cn.style.display='none';fi.style.display='block';
    ST('3D加载超时，已切换为2D版 🐾');
  },3000);

  var lo=new THREE.GLTFLoader();
  lo.load('https://github.com/stitch-companion/stitch-companion/releases/download/v1.0.0/default.glb',
    function(g){
      clearTimeout(modelLoadTimer);modelLoadTimer=null;
      var ml=document.getElementById('modelLoad');if(ml)ml.remove();
      model=g.scene;model.position.y=0;model.traverse(function(c){if(c.isMesh){c.castShadow=true;c.receiveShadow=true}});scene.add(model);
      ST('🎉 3D史迪仔来了！');
    },
    function(x){if(x.total>0){var p=Math.floor(x.loaded/x.total*100);var pb=document.getElementById('progBar');if(pb)pb.style.width=p+'%';var pt=document.getElementById('progTxt');if(pt)pt.textContent=p+'% - 加载3D...'}},
    function(){
      clearTimeout(modelLoadTimer);modelLoadTimer=null;
      var ml=document.getElementById('modelLoad');if(ml)ml.remove();
      cn.style.display='none';fi.style.display='block';
      ST('3D加载失败，已切换为2D版 🐾');
    }
  );
  an();
}
function an(){requestAnimationFrame(an);if(model){var t=Date.now()*.001;model.position.y=Math.sin(t*.8)*.08;model.rotation.y=Math.sin(t*.5)*.1}if(renderer)renderer.render(scene,camera)}
